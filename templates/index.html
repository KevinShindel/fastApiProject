<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Карта Херсона</title>
    <script type="text/javascript" src="https://polyfill.io/v3/polyfill.min.js?features=default"></script>
</head>

<body>

<div class="navigation-block">
    <label for="map_type">Map Type</label>
    <select id="map_type" onchange="init_map()">
        <option value="ROADMAP">ROADMAP</option>
        <option value="SATELLITE">SATELLITE</option>
        <option value="HYBRID" selected>HYBRID</option>
        <option value="TERRAIN">TERRAIN</option>
    </select>
</div>

<div id="map" style="width: 100%; height: 800px; margin-left: auto; margin-right: auto"></div>
<script type="text/javascript" src="../static/jquery-3.6.0.min.js"></script>
<script type="text/javascript" src="https://maps.googleapis.com/maps/api/js?key=AIzaSyANB7i4BI8rnY2vCl3W7QdEU9xxmGIMIgA"></script>
<script type="text/javascript" src="../static/jquery.googlemap.js"></script>
<script type="text/javascript" src="../static/main.js"></script>
</body>

</html>
